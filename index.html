<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PrimaStella｜東広島 西条 イタリアン</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Noto Sans JP',serif;
background:#0b0b0b;
color:#fff;
padding-bottom:60px; /* CTA被り防止 */
}

/* HERO */
.hero{
height:60vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
url("https://raw.githubusercontent.com/PrimaStella2020/primastella-site/main/interior.jpg")
center/cover;
}

.hero h1{font-size:26px;}
.hero p{font-size:13px;}

/* ボタン */
.btn{
display:block;
margin:10px auto;
padding:12px;
border-radius:30px;
text-decoration:none;
color:#fff;
width:80%;
text-align:center;
}
.line{background:#00c300;}
.tel{background:#333;}

/* セクション */
section{
padding:35px 15px;
text-align:center;
}

h2{font-size:18px;}

.info{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:10px;
font-size:13px;
text-align:left;
}

/* 画像 */
.slider{
display:flex;
overflow-x:auto;
gap:10px;
}
.slider img{
width:80%;
height:160px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

/* 口コミ */
.review{
background:rgba(255,255,255,0.05);
padding:12px;
margin:8px 0;
border-radius:10px;
font-size:13px;
}

/* 下固定CTA */
.bottom-cta{
position:fixed;
bottom:0;
left:0;
width:100%;
display:flex;
z-index:999;
}
.bottom-cta a{
flex:1;
padding:14px;
text-align:center;
color:#fff;
text-decoration:none;
font-size:14px;
}
.bottom-cta .line{background:#00c300;}
.bottom-cta .tel{background:#111;}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<h1>PrimaStella</h1>
<p>西条で静かに味わうイタリアン</p>
<a href="https://lin.ee/NRcZyQu" class="btn line">LINEで予約する</a>
</section>

<!-- 料理 -->
<section>
<h2>料理</h2>
<div class="slider" id="gallery">
<img src="https://raw.githubusercontent.com/PrimaStella2020/primastella-site/main/pasta1.jpg">
<img src="https://raw.githubusercontent.com/PrimaStella2020/primastella-site/main/pasta2.jpg">
<img src="https://raw.githubusercontent.com/PrimaStella2020/primastella-site/main/pizza.jpg">
</div>
</section>

<!-- 中CTA -->
<section>
<a href="https://lin.ee/NRcZyQu" class="btn line">空き確認・予約する</a>
</section>

<!-- 理由 -->
<section>
<h2>選ばれる理由</h2>
<div class="info">
<p>落ち着いた空間</p>
<p>デート・記念日に最適</p>
<p>リピーター多数</p>
</div>
</section>

<!-- 口コミ -->
<section>
<h2>口コミ</h2>
<div class="review">★★★★★ 雰囲気が最高</div>
<div class="review">★★★★★ また来たい</div>
</section>

<!-- 店舗情報 -->
<section>
<h2>店舗情報</h2>
<div class="info">
<p>広島県東広島市西条上市町6-19 2F</p>
<p>082-423-3067</p>
</div>
</section>

<!-- MAP -->
<section>
<iframe src="https://maps.google.com/maps?q=東広島市西条上市町6-19%202F&output=embed"
width="100%" height="250"></iframe>
</section>

<!-- CTA -->
<section>
<a href="https://lin.ee/NRcZyQu" class="btn line">LINE予約する</a>
<a href="tel:0824233067" class="btn tel">電話する</a>
</section>

<!-- 下固定CTA（最重要） -->
<div class="bottom-cta">
<a href="https://lin.ee/NRcZyQu" class="line">LINE予約</a>
<a href="tel:0824233067" class="tel">電話予約</a>
</div>

<script>
// 画像クリック → メニュー
document.querySelectorAll('#gallery img').forEach(img=>{
img.onclick=()=>window.open("https://r.gnavi.co.jp/46jvg7pw0000/menu3/","_blank");
});
</script>

</body>
</html>
