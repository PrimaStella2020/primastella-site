<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimaStella</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Noto Sans JP',sans-serif;background:#f5f5f5;color:#333;}

/* ヘッダー */
header{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
color:#fff;
z-index:10;
}

nav a{
margin:0 10px;
color:#fff;
text-decoration:none;
}

/* ヒーロー */
.hero{
height:100vh;
background:url("ここに外観画像URL") center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:#fff;
position:relative;
}

.hero::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

.hero h1{font-size:48px;z-index:1;}
.hero p{z-index:1;margin-bottom:20px;}

.btn{
z-index:1;
padding:12px 20px;
margin:5px;
border-radius:5px;
text-decoration:none;
color:#fff;
display:inline-block;
}

.tel{background:#8b0000;}
.line{background:#00c300;}
.insta{background:#c13584;}

/* 特徴 */
.features{
display:flex;
justify-content:space-around;
padding:40px 20px;
background:#fff;
text-align:center;
}

/* メニュー */
.menu{
padding:50px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:#fff;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

/* セクション */
.section-dark{
background:#111;
color:#fff;
padding:60px 20px;
text-align:center;
}

/* 口コミ */
.reviews{
display:flex;
gap:10px;
padding:40px;
}

.review{
background:#fff;
padding:20px;
border-radius:10px;
flex:1;
}

/* アクセス */
.access{
display:flex;
padding:40px;
gap:20px;
}

/* フッター */
footer{
background:#5a1a1a;
color:#fff;
padding:20px;
text-align:center;
}
</style>
</head>

<body>

<header>
<h2>PrimaStella</h2>
<nav>
<a href="#">ホーム</a>
<a href="#">メニュー</a>
<a href="#">店内</a>
<a href="#">アクセス</a>
</nav>
</header>

<section class="hero">
<h1>西条で見つけた<br>大人のイタリアン</h1>
<p>こだわりの料理と心地よい空間</p>

<a href="tel:0824233067" class="btn tel">電話予約</a>
<a href="https://lin.ee/NRcZyQu" class="btn line">LINE予約</a>
<a href="https://www.instagram.com/primastella2020" class="btn insta">Instagram</a>
</section>

<section class="features">
<div>本格イタリアン</div>
<div>豊富なドリンク</div>
<div>女子会・デート</div>
<div>駐車場あり</div>
</section>

<section class="menu">
<h2>おすすめメニュー</h2>

<div class="grid">
<div class="card"><img src="パスタURL"><p>カルボナーラ</p></div>
<div class="card"><img src="パスタURL"><p>トマトパスタ</p></div>
<div class="card"><img src="ピザURL"><p>ピザ</p></div>
<div class="card"><img src="デザートURL"><p>デザート</p></div>
</div>
</section>

<section class="section-dark">
<h2>くつろぎの空間</h2>
<p>落ち着いた店内で特別なひとときを</p>
</section>

<section class="menu">
<div class="grid">
<div class="card"><img src="pizza.jpg"></div>
<div class="card"><img src="パスタURL"></div>
<div class="card"><img src="パスタURL"></div>
</div>
</section>

<section class="reviews">
<div class="review">デートで最高でした</div>
<div class="review">ランチが安くて美味しい</div>
<div class="review">また来たいお店</div>
</section>

<section class="access">
<div>
<h3>アクセス</h3>
<p>広島県東広島市西条上市町6-19</p>
<p>082-423-3067</p>
</div>
<div>
<iframe src="https://maps.google.com/maps?q=東広島&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%" height="200"></iframe>
</div>
</section>

<footer>
© PrimaStella
</footer>

</body>
</html>
