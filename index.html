<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PrimaStella｜東広島 西条 イタリアン</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Noto Sans JP',serif;
background:#0b0b0b;
color:#fff;
}

/* ナビ */
nav{
position:fixed;
top:0;
width:100%;
background:#111;
padding:10px;
text-align:center;
z-index:999;
}
nav a{
color:#fff;
margin:0 10px;
text-decoration:none;
font-size:13px;
}

/* HERO */
.hero{
height:70vh;
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.8)),
url("https://raw.githubusercontent.com/PrimaStella2020/primastella-site/main/interior.jpg")
center/cover;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}
.hero h1{font-size:28px;}
.hero p{font-size:13px;}

.btn{
display:inline-block;
margin:6px;
padding:10px 14px;
border-radius:30px;
text-decoration:none;
color:#fff;
border:1px solid rgba(255,255,255,0.2);
font-size:13px;
}
.line{background:#00c300;}
.tel{background:#222;}

section{
padding:40px 15px;
text-align:center;
scroll-margin-top:60px;
}

h2{
font-size:20px;
margin-bottom:15px;
font-weight:300;
}

.info{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:10px;
text-align:left;
font-size:13px;
}

/* 画像 */
.slider-wrapper{
display:flex;
overflow:hidden;
height:180px;
}
.slider-wrapper img{
min-width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

/* 口コミ */
.review-wrapper{
display:flex;
overflow:hidden;
}
.review{
min-width:100%;
padding:15px;
background:rgba(255,255,255,0.05);
border-radius:10px;
font-size:13px;
}

/* 固定CTA */
.sticky{
position:fixed;
bottom:0;
width:100%;
display:flex;
}
.sticky a{
flex:1;
padding:12px;
text-align:center;
color:#fff;
text-decoration:none;
font-size:14px;
}
.sticky .line{background:#00c300;}
.sticky .tel{background:#111;}
</style>
</head>

<body>

<nav>
<a href="#menu">メニュー</a>
<a href="#reviews">口コミ</a>
<a href="#info">店舗情報</a>
</nav>

<section class="hero">
<h1>PrimaStella</h1>
<p>西条で、静かに味わう本物のイタリアン</p>
<a href="tel:0824233067" class="btn tel">電話予約</a>
<a href="https://lin.ee/NRcZyQu" class="btn line">LINE予約</a>
</section>

<section>
<h2>料理</h2>
<div class="slider-wrapper" id="gallery">
<img src="https://raw.githubusercontent.com/PrimaStella2020/primastella-site/main/pasta1.jpg">
<img src="https://raw.githubusercontent.com/PrimaStella2020/primastella-site/main/pasta2.jpg">
<img src="https://raw.githubusercontent.com/PrimaStella2020/primastella-site/main/pizza.jpg">
<img src="https://raw.githubusercontent.com/PrimaStella2020/primastella-site/main/dessert.jpg">
</div>
</section>

<section id="menu">
<h2>メニュー</h2>
<div class="info">
<p>パスタ ¥1,200〜</p>
<p>ピッツァ ¥1,300〜</p>
<p>コース ¥3,000〜</p>
</div>
<a href="https://r.gnavi.co.jp/46jvg7pw0000/menu3/" target="_blank" class="btn">詳細を見る</a>
</section>

<section>
<h2>選ばれる理由</h2>
<div class="info">
<p>落ち着いた空間</p>
<p>デート・記念日に最適</p>
<p>ワインと料理のバランス</p>
<p>リピーター多数</p>
</div>
</section>

<section id="reviews">
<h2>口コミ</h2>
<div class="review-wrapper">
<div class="review">★★★★★ 雰囲気が最高</div>
<div class="review">★★★★★ また来たい</div>
<div class="review">★★★★★ 美味しい</div>
</div>
</section>

<section>
<h3>ご予約について</h3>
<div class="info">
<p>※週末は満席の場合あり</p>
</div>
</section>

<section id="info">
<h2>店舗情報</h2>
<div class="info">
<p>広島県東広島市西条上市町6-19 2F</p>
<p>082-423-3067</p>
</div>
</section>

<section>
<iframe src="https://maps.google.com/maps?q=東広島市西条上市町6-19 2F&output=embed"
width="100%" height="250"></iframe>
</section>

<section>
<h2>ご予約</h2>
<a href="tel:0824233067" class="btn tel">電話</a>
<a href="https://lin.ee/NRcZyQu" class="btn line">LINE</a>
</section>

<div class="sticky">
<a href="tel:0824233067" class="tel">📞</a>
<a href="https://lin.ee/NRcZyQu" class="line">LINE</a>
</div>

<script>
// 画像クリック → ぐるなび
document.querySelectorAll('#gallery img').forEach(img=>{
img.onclick=()=>window.open("https://r.gnavi.co.jp/46jvg7pw0000/menu3/","_blank");
});
</script>

</body>
</html>
